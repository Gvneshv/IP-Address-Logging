storage:
  log_file: logs/audit.jsonl
  archive_dir: logs/archive
  backup_dirs: []

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

scheduler:
  windows_startup_task_name: AuditLogger

router:
  enabled: true
  connection:
    address: "http://192.168.0.1"   # your router's actual admin URL
    username: "admin"
    password: "YOUR_ADMIN_PASSWORD"  # the router admin login, not the WiFi password
    timeout: 30
    verify_tls: false
  detection:
    type: "tplink"

logging:
  level: INFO
  log_file: logs/auditlogger.log